
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .app {
    background: linear-gradient(to bottom, #111111, #3a3a3a);
    min-height: 700px;
    border-radius: 16px;
    padding: 24px 20px;
    color: white;
  }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 20px; font-weight: 500; letter-spacing: 0.5px; }
  .header p { font-size: 12px; color: #aaa; margin-top: 4px; }

  .balance-card {
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
  }
  .balance-label { font-size: 12px; color: #bbb; margin-bottom: 4px; }
  .balance-total { font-size: 32px; font-weight: 500; color: white; }

  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .summary-card {
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .summary-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
  .income-val { font-size: 20px; font-weight: 500; color: #4ade80; }
  .expense-val { font-size: 20px; font-weight: 500; color: #f87171; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .btn-beige {
    background: #b5956a;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font-sans);
    transition: background 0.15s;
  }
  .btn-beige:hover { background: #9e7d54; }

  .section-title { font-size: 13px; color: #bbb; margin-bottom: 10px; font-weight: 500; }

  .month-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 14px; scrollbar-width: none; }
  .month-tab {
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: #ccc;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .month-tab.active { background: #b5956a; border-color: #b5956a; color: white; }

  .transactions { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tx-left { display: flex; flex-direction: column; }
  .tx-desc { font-size: 13px; color: white; }
  .tx-date { font-size: 11px; color: #888; margin-top: 2px; }
  .tx-amount { font-size: 15px; font-weight: 500; }
  .tx-amount.income { color: #4ade80; }
  .tx-amount.expense { color: #f87171; }

  .modal-bg {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    border-radius: 16px;
    z-index: 10;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #1e1e1e;
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 20px;
    width: 280px;
  }
  .modal h2 { font-size: 15px; font-weight: 500; color: white; margin-bottom: 16px; }
  .modal label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; margin-top: 10px; }
  .modal input, .modal select {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: white;
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--font-sans);
  }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel {
    flex: 1; background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 9px; color: #ccc; font-size: 13px; cursor: pointer; font-family: var(--font-sans);
  }
  .btn-save {
    flex: 1; background: #b5956a; border: none;
    border-radius: 8px; padding: 9px; color: white; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font-sans);
  }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-header { font-size: 10px; color: #888; text-align: center; padding: 4px 0; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #ccc; border-radius: 50%; cursor: default;
  }
  .cal-day.has-tx { background: #b5956a; color: white; font-weight: 500; cursor: pointer; }
  .cal-day.empty { color: transparent; }
  .cal-month-title { font-size: 13px; color: white; text-align: center; margin-bottom: 10px; font-weight: 500; }
</style>

<div class="app" id="app" style="position:relative;">
  <div class="header">
    <h1>Mis Finanzas</h1>
    <p id="current-month-label">Abril 2025</p>
  </div>

  <div class="balance-card">
    <div class="balance-label">Balance total</div>
    <div class="balance-total" id="balance-total">$0</div>
  </div>

  <div class="summary-row">
    <div class="summary-card">
      <div class="summary-label">Ingresos</div>
      <div class="income-val" id="total-income">$0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Gastos</div>
      <div class="expense-val" id="total-expense">$0</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-beige" onclick="openAddModal()">+ Agregar registro</button>
    <button class="btn-beige" onclick="openCalModal()">Calendario</button>
  </div>

  <div class="section-title">Meses registrados</div>
  <div class="month-tabs" id="month-tabs"></div>

  <div class="section-title">Transacciones</div>
  <div class="transactions" id="tx-list"></div>

  <!-- Add modal -->
  <div class="modal-bg" id="add-modal">
    <div class="modal">
      <h2>Nuevo registro</h2>
      <label>Tipo</label>
      <select id="tx-type">
        <option value="income">Ingreso</option>
        <option value="expense">Gasto</option>
      </select>
      <label>Descripción</label>
      <input type="text" id="tx-desc" placeholder="Ej. Salario, Arriendo..." />
      <label>Monto</label>
      <input type="number" id="tx-amount" placeholder="0" />
      <label>Fecha</label>
      <input type="date" id="tx-date" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('add-modal')">Cancelar</button>
        <button class="btn-save" onclick="saveTransaction()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Calendar modal -->
  <div class="modal-bg" id="cal-modal">
    <div class="modal" style="width:300px;">
      <h2 style="display:flex;justify-content:space-between;align-items:center;">
        <span id="cal-title">Calendario</span>
        <button class="btn-cancel" style="width:auto;padding:4px 10px;font-size:12px;" onclick="closeModal('cal-modal')">X</button>
      </h2>
      <div class="cal-month-title" id="cal-month-nav" style="display:flex;align-items:center;justify-content:space-between;">
        <button onclick="calPrev()" style="background:none;border:none;color:#b5956a;font-size:16px;cursor:pointer;">&#8249;</button>
        <span id="cal-month-title">Abril 2025</span>
        <button onclick="calNext()" style="background:none;border:none;color:#b5956a;font-size:16px;cursor:pointer;">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="cal-detail" style="margin-top:12px;font-size:12px;color:#ccc;min-height:40px;"></div>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];

let transactions = [
  {id:1, type:'income', desc:'Salario', amount:3200000, date:'2025-04-01'},
  {id:2, type:'expense', desc:'Arriendo', amount:900000, date:'2025-04-05'},
  {id:3, type:'expense', desc:'Mercado', amount:280000, date:'2025-04-10'},
  {id:4, type:'income', desc:'Freelance', amount:500000, date:'2025-04-15'},
  {id:5, type:'expense', desc:'Transporte', amount:120000, date:'2025-03-20'},
  {id:6, type:'income', desc:'Bono', amount:400000, date:'2025-03-05'},
];

let selectedMonth = '2025-04';
let calYear = 2025;
let calMonth = 3;

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-CO');
}

function getMonths() {
  const set = new Set(transactions.map(t => t.date.slice(0,7)));
  return [...set].sort().reverse();
}

function renderMonthTabs() {
  const months = getMonths();
  const container = document.getElementById('month-tabs');
  container.innerHTML = '';
  months.forEach(m => {
    const [y, mo] = m.split('-');
    const btn = document.createElement('div');
    btn.className = 'month-tab' + (m === selectedMonth ? ' active' : '');
    btn.textContent = MONTHS[parseInt(mo)-1] + ' ' + y;
    btn.onclick = () => { selectedMonth = m; render(); };
    container.appendChild(btn);
  });
}

function renderSummary() {
  const months = getMonths();
  let totalIncome = 0, totalExpense = 0;
  months.forEach(m => {
    transactions.filter(t => t.date.slice(0,7) === m).forEach(t => {
      if(t.type === 'income') totalIncome += t.amount;
      else totalExpense += t.amount;
    });
  });
  document.getElementById('total-income').textContent = fmt(totalIncome);
  document.getElementById('total-expense').textContent = fmt(totalExpense);
  document.getElementById('balance-total').textContent = fmt(totalIncome - totalExpense);
  const [y, mo] = selectedMonth.split('-');
  document.getElementById('current-month-label').textContent = MONTHS[parseInt(mo)-1] + ' ' + y;
}

function renderTransactions() {
  const list = transactions.filter(t => t.date.slice(0,7) === selectedMonth)
    .sort((a,b) => b.date.localeCompare(a.date));
  const container = document.getElementById('tx-list');
  if(list.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:#666;font-size:13px;padding:20px;">Sin registros este mes</div>';
    return;
  }
  container.innerHTML = list.map(t => {
    const d = new Date(t.date + 'T12:00:00');
    const dateStr = d.getDate() + ' ' + MONTHS[d.getMonth()].slice(0,3) + ' ' + d.getFullYear();
    return `<div class="tx-item">
      <div class="tx-left">
        <span class="tx-desc">${t.desc}</span>
        <span class="tx-date">${dateStr}</span>
      </div>
      <span class="tx-amount ${t.type === 'income' ? 'income' : 'expense'}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</span>
    </div>`;
  }).join('');
}

function render() {
  renderMonthTabs();
  renderSummary();
  renderTransactions();
}

function openAddModal() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('tx-date').value = today;
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-amount').value = '';
  document.getElementById('add-modal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function saveTransaction() {
  const type = document.getElementById('tx-type').value;
  const desc = document.getElementById('tx-desc').value.trim();
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const date = document.getElementById('tx-date').value;
  if(!desc || !amount || !date) { return; }
  transactions.push({id: Date.now(), type, desc, amount, date});
  selectedMonth = date.slice(0,7);
  closeModal('add-modal');
  render();
}

function openCalModal() {
  const [y, m] = selectedMonth.split('-');
  calYear = parseInt(y); calMonth = parseInt(m) - 1;
  renderCal();
  document.getElementById('cal-modal').classList.add('open');
}

function renderCal() {
  document.getElementById('cal-month-title').textContent = MONTHS[calMonth] + ' ' + calYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = DAYS.map(d => `<div class="cal-header">${d}</div>`).join('');
  const txDates = new Set(transactions.filter(t => {
    const d = new Date(t.date + 'T12:00:00');
    return d.getFullYear() === calYear && d.getMonth() === calMonth;
  }).map(t => new Date(t.date + 'T12:00:00').getDate()));

  const first = new Date(calYear, calMonth, 1).getDay();
  for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-day empty"></div>`;
  const days = new Date(calYear, calMonth+1, 0).getDate();
  for(let d=1; d<=days; d++) {
    const hasTx = txDates.has(d);
    grid.innerHTML += `<div class="cal-day${hasTx?' has-tx':''}" onclick="showCalDetail(${d})">${d}</div>`;
  }
  document.getElementById('cal-detail').innerHTML = '';
}

function showCalDetail(day) {
  const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const list = transactions.filter(t => t.date === dateStr);
  if(list.length === 0) { document.getElementById('cal-detail').innerHTML = '<span style="color:#666">Sin registros este día</span>'; return; }
  document.getElementById('cal-detail').innerHTML = list.map(t =>
    `<div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <span>${t.desc}</span>
      <span style="color:${t.type==='income'?'#4ade80':'#f87171'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</span>
    </div>`
  ).join('');
}

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

render();
</script>
